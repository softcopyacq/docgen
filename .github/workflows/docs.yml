name: Auto-generate docs with IBM Bob

on:
  push:
    branches: [main]
    paths:
      - "**.py"

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DocGen dependencies
        run: pip install click

      - name: Run DocGen
        env:
          BOB_API_KEY: ${{ secrets.BOB_API_KEY }}
        run: |
          python main.py . --output ./docs --format all --project-name "${{ github.event.repository.name }}"

      - name: Commit generated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-generated by DocGen + IBM Bob"
          file_pattern: "docs/*"
